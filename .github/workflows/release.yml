name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Generate changelog and create release
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          mode: "COMMIT"
          configurationJson: |
            {
              "template": "## Що нового у версії #{{TO_TAG}}\n\n#{{CHANGELOG}}\n#{{UNCATEGORIZED}}",
              "commit_template": "- #{{TITLE}}",
              "categories": [
                {
                  "title": "### ✨ Нові можливості\n",
                  "labels": ["feat"]
                },
                {
                  "title": "### 🐛 Виправлення\n",
                  "labels": ["fix"]
                },
                {
                  "title": "### 🔧 Інші зміни\n",
                  "labels": ["refactor", "perf", "docs", "style", "test"]
                }
              ],
              "label_extractor": [
                {
                  "pattern": "^(feat|fix|refactor|perf|docs|style|test|chore|ci|build)(\\(.*\\))?!?:",
                  "target": "$1",
                  "on_property": "title"
                },
                {
                  "pattern": "^\\d+\\.\\d+\\.\\d+$",
                  "target": "chore",
                  "on_property": "title"
                }
              ],
              "ignore_labels": ["chore", "ci", "build"],
              "trim_values": true,
              "empty_template": "Немає змін"
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_TAG=${GITHUB_REF#refs/tags/}

          # Create release with generated changelog
          gh release create "$CURRENT_TAG" --notes "${{ steps.changelog.outputs.changelog }}" --draft 2>/dev/null || \
            gh release edit "$CURRENT_TAG" --notes "${{ steps.changelog.outputs.changelog }}"

  release:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    environment: production
    needs: create-release

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.7.1

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup MSVC (Windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STORAGE_IMAGES_URL: ${{ secrets.VITE_STORAGE_IMAGES_URL }}
          VITE_MIXPANEL_TOKEN_PROD: ${{ secrets.VITE_MIXPANEL_TOKEN_PROD }}
          VITE_KURIN_KEY: ${{ secrets.VITE_KURIN_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_URL: ${{ secrets.SENTRY_URL }}
        run: pnpm build

      # --- Build dist (no publish) ---

      - name: Build dist (Windows)
        if: matrix.os == 'windows-latest'
        timeout-minutes: 20
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STORAGE_IMAGES_URL: ${{ secrets.VITE_STORAGE_IMAGES_URL }}
          VITE_MIXPANEL_TOKEN_PROD: ${{ secrets.VITE_MIXPANEL_TOKEN_PROD }}
          VITE_KURIN_KEY: ${{ secrets.VITE_KURIN_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm dist:win --publish never

      - name: Build dist (Linux)
        if: matrix.os == 'ubuntu-latest'
        timeout-minutes: 20
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STORAGE_IMAGES_URL: ${{ secrets.VITE_STORAGE_IMAGES_URL }}
          VITE_MIXPANEL_TOKEN_PROD: ${{ secrets.VITE_MIXPANEL_TOKEN_PROD }}
          VITE_KURIN_KEY: ${{ secrets.VITE_KURIN_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm dist:linux --publish never

      - name: Setup Apple API Key for notarization
        if: matrix.os == 'macos-latest'
        run: |
          set +x
          echo "${{ secrets.APPLE_API_KEY }}" > /tmp/apple-api-key.p8
          chmod 600 /tmp/apple-api-key.p8

      - name: Build dist (macOS)
        if: matrix.os == 'macos-latest'
        timeout-minutes: 30
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STORAGE_IMAGES_URL: ${{ secrets.VITE_STORAGE_IMAGES_URL }}
          VITE_MIXPANEL_TOKEN_PROD: ${{ secrets.VITE_MIXPANEL_TOKEN_PROD }}
          VITE_KURIN_KEY: ${{ secrets.VITE_KURIN_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code Signing
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Notarization (API Key)
          APPLE_API_KEY: /tmp/apple-api-key.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: pnpm dist:mac --publish never

      # --- E2E tests on built app ---

      - name: Install Electron system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libatk1.0-0 libatk-bridge2.0-0 \
            libgdk-pixbuf2.0-0 libgtk-3-0 libgbm-dev libnss3-dev libxss-dev \
            libasound2t64
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Setup virtual display (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          Xvfb :99 -screen 0 1400x900x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Remove macOS quarantine
        if: matrix.os == 'macos-latest'
        run: xattr -cr release/*/mac-arm64/*.app || xattr -cr release/*/mac/*.app || true

      - name: Run E2E tests
        run: pnpm test:e2e
        timeout-minutes: 10
        env:
          ELECTRON_ENABLE_LOGGING: '1'

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ matrix.os }}
          path: playwright-report/
          retention-days: 7

      # --- Publish to GitHub Release ---

      - name: Publish artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          RELEASE_DIR="release/${VERSION}"

          echo "Publishing artifacts from: $RELEASE_DIR"
          ls -la "$RELEASE_DIR" || true

          for file in "$RELEASE_DIR"/*.exe "$RELEASE_DIR"/*.dmg "$RELEASE_DIR"/*.AppImage "$RELEASE_DIR"/*.rpm "$RELEASE_DIR"/*.zip "$RELEASE_DIR"/*.blockmap "$RELEASE_DIR"/*.yml; do
            if [ -f "$file" ]; then
              echo "Uploading: $file"
              gh release upload "$CURRENT_TAG" "$file" --clobber || true
            fi
          done

  # Trigger package rebuilds after all platform builds complete
  trigger-packages:
    runs-on: ubuntu-latest
    needs: release
    environment: production
    steps:
      - name: Trigger Flatpak repo build
        env:
          GH_TOKEN: ${{ secrets.FLATPAK_DISPATCH_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Triggering Flatpak build for tag: $TAG"
          jq -n --arg tag "$TAG" '{"event_type":"new-release","client_payload":{"tag":$tag}}' | \
            gh api repos/Vadko/lbk-flatpak/dispatches --method POST --input -

      - name: Trigger AUR package update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Triggering AUR update for tag: $TAG"
          gh workflow run update-aur.yml --repo Vadko/lbk-launcher -f app_version="$TAG"
