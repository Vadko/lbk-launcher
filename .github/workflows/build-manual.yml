name: Manual Build

on:
  workflow_dispatch:
    inputs:
      windows:
        description: 'Build for Windows'
        required: false
        type: boolean
        default: true
      linux:
        description: 'Build for Linux'
        required: false
        type: boolean
        default: true
      macos:
        description: 'Build for macOS'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: manual-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create-prerelease:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.create_tag.outputs.tag_name }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version and create tag
        id: create_tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          BRANCH_NAME=${GITHUB_REF_NAME//\//-}
          TAG_NAME="v${VERSION}-dev.${BRANCH_NAME}.${TIMESTAMP}"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Creating prerelease tag: $TAG_NAME"

      - name: Build matrix
        id: matrix
        run: |
          MATRIX='{"include":['
          FIRST=true
          if [ "${{ github.event.inputs.windows }}" = "true" ]; then
            MATRIX="${MATRIX}{\"os\":\"windows-latest\",\"platform\":\"windows\"}"
            FIRST=false
          fi
          if [ "${{ github.event.inputs.linux }}" = "true" ]; then
            [ "$FIRST" = false ] && MATRIX="${MATRIX},"
            MATRIX="${MATRIX}{\"os\":\"ubuntu-latest\",\"platform\":\"linux\"}"
            FIRST=false
          fi
          if [ "${{ github.event.inputs.macos }}" = "true" ]; then
            [ "$FIRST" = false ] && MATRIX="${MATRIX},"
            MATRIX="${MATRIX}{\"os\":\"macos-latest\",\"platform\":\"macos\"}"
          fi
          MATRIX="${MATRIX}]}"
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

      - name: Create prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ steps.create_tag.outputs.tag_name }}"
          BRANCH_NAME=${GITHUB_REF_NAME}

          gh release create "$TAG_NAME" \
            --title "Dev Build: $TAG_NAME" \
            --notes "Development build from branch \`$BRANCH_NAME\`

          **This is a prerelease build for testing purposes only.**

          Triggered manually at $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --prerelease \
            --draft

  build:
    needs: create-prerelease
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    environment: production

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.create-prerelease.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.7.1

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup MSVC (Windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STORAGE_IMAGES_URL: ${{ secrets.VITE_STORAGE_IMAGES_URL }}
          VITE_MIXPANEL_TOKEN_PROD: ${{ secrets.VITE_MIXPANEL_TOKEN_PROD }}
          VITE_KURIN_KEY: ${{ secrets.VITE_KURIN_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_URL: ${{ secrets.SENTRY_URL }}
        run: pnpm build

      - name: Build dist (Windows)
        if: matrix.os == 'windows-latest'
        timeout-minutes: 20
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STORAGE_IMAGES_URL: ${{ secrets.VITE_STORAGE_IMAGES_URL }}
          VITE_MIXPANEL_TOKEN_PROD: ${{ secrets.VITE_MIXPANEL_TOKEN_PROD }}
          VITE_KURIN_KEY: ${{ secrets.VITE_KURIN_KEY }}
        run: pnpm dist:win --publish never

      - name: Build dist (Linux)
        if: matrix.os == 'ubuntu-latest'
        timeout-minutes: 20
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STORAGE_IMAGES_URL: ${{ secrets.VITE_STORAGE_IMAGES_URL }}
          VITE_MIXPANEL_TOKEN_PROD: ${{ secrets.VITE_MIXPANEL_TOKEN_PROD }}
          VITE_KURIN_KEY: ${{ secrets.VITE_KURIN_KEY }}
        run: pnpm dist:linux --publish never

      - name: Setup Apple API Key for notarization
        if: matrix.os == 'macos-latest'
        run: |
          set +x
          echo "${{ secrets.APPLE_API_KEY }}" > /tmp/apple-api-key.p8
          chmod 600 /tmp/apple-api-key.p8

      - name: Build dist (macOS)
        if: matrix.os == 'macos-latest'
        timeout-minutes: 30
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STORAGE_IMAGES_URL: ${{ secrets.VITE_STORAGE_IMAGES_URL }}
          VITE_MIXPANEL_TOKEN_PROD: ${{ secrets.VITE_MIXPANEL_TOKEN_PROD }}
          VITE_KURIN_KEY: ${{ secrets.VITE_KURIN_KEY }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: /tmp/apple-api-key.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: pnpm dist:mac --publish never

      # --- E2E tests on built app ---

      - name: Install Electron system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libatk1.0-0 libatk-bridge2.0-0 \
            libgdk-pixbuf2.0-0 libgtk-3-0 libgbm-dev libnss3-dev libxss-dev \
            libasound2t64
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Setup virtual display (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          Xvfb :99 -screen 0 1400x900x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Remove macOS quarantine
        if: matrix.os == 'macos-latest'
        run: xattr -cr release/*/mac-arm64/*.app || xattr -cr release/*/mac/*.app || true

      - name: Run E2E tests
        run: pnpm test:e2e
        timeout-minutes: 10
        env:
          ELECTRON_ENABLE_LOGGING: '1'

      - name: Report E2E results
        if: always()
        uses: daun/playwright-report-summary@v3
        with:
          report-file: e2e/results.json
          report-tag: build-${{ matrix.platform }}
          job-summary: true
          create-comment: false

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ matrix.os }}
          path: playwright-report/
          retention-days: 7

      # --- Upload artifacts to release ---

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          RELEASE_DIR="release/${VERSION}"

          echo "Looking for artifacts in: $RELEASE_DIR"
          ls -la "$RELEASE_DIR" || true

          # Upload all distributable files
          for file in "$RELEASE_DIR"/*.{exe,dmg,AppImage,rpm,zip,blockmap,yml}; do
            if [ -f "$file" ]; then
              echo "Uploading: $file"
              gh release upload "${{ needs.create-prerelease.outputs.tag_name }}" "$file" --clobber || true
            fi
          done

  cleanup-on-failure:
    needs: [create-prerelease, build]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Delete failed release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ needs.create-prerelease.outputs.tag_name }}" --yes || true
