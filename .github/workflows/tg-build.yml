name: TG Build (admin-version)

on:
  workflow_dispatch:
    inputs:
      chat_id:
        description: 'Telegram supergroup chat_id (e.g. -1001234567890)'
        required: true
        type: string
      thread_id:
        description: 'Telegram message_thread_id inside that supergroup'
        required: true
        type: string
      triggered_by:
        description: 'Username/name of person who triggered the build'
        required: false
        type: string
        default: 'unknown'

permissions:
  contents: write

concurrency:
  group: tg-build
  cancel-in-progress: false

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ inputs.chat_id }}
  TELEGRAM_THREAD_ID: ${{ inputs.thread_id }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    environment: production
    outputs:
      tag_name: ${{ steps.tag.outputs.tag_name }}
    steps:
      - name: Checkout admin-version
        uses: actions/checkout@v4
        with:
          ref: admin-version
          fetch-depth: 0

      - name: Notify start
        env:
          TRIGGERED_BY: ${{ inputs.triggered_by }}
        run: node scripts/tg-notify.mjs start

      - name: Merge main → admin-version
        id: merge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          if ! git merge origin/main --no-edit; then
            git merge --abort || true
            node scripts/tg-notify.mjs merge_conflict
            exit 1
          fi
          git push origin admin-version

      - name: Compute tag
        id: tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          echo "tag_name=v${VERSION}-dev.admin-version.${TIMESTAMP}" >> $GITHUB_OUTPUT

      - name: Notify build start
        env:
          TAG_NAME: ${{ steps.tag.outputs.tag_name }}
        run: node scripts/tg-notify.mjs build_start

  build:
    needs: prepare
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    environment: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
    steps:
      - name: Checkout admin-version
        uses: actions/checkout@v4
        with:
          ref: admin-version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.20.0'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.7.1

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup MSVC (Windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STORAGE_IMAGES_URL: ${{ secrets.VITE_STORAGE_IMAGES_URL }}
          VITE_MIXPANEL_TOKEN_PROD: ${{ secrets.VITE_MIXPANEL_TOKEN_PROD }}
          VITE_KURIN_KEY: ${{ secrets.VITE_KURIN_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_URL: ${{ secrets.SENTRY_URL }}
        run: pnpm build

      - name: Build dist (Windows)
        if: matrix.os == 'windows-latest'
        timeout-minutes: 25
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STORAGE_IMAGES_URL: ${{ secrets.VITE_STORAGE_IMAGES_URL }}
          VITE_MIXPANEL_TOKEN_PROD: ${{ secrets.VITE_MIXPANEL_TOKEN_PROD }}
          VITE_KURIN_KEY: ${{ secrets.VITE_KURIN_KEY }}
        run: pnpm dist:win --publish never

      - name: Build dist (Linux)
        if: matrix.os == 'ubuntu-latest'
        timeout-minutes: 25
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STORAGE_IMAGES_URL: ${{ secrets.VITE_STORAGE_IMAGES_URL }}
          VITE_MIXPANEL_TOKEN_PROD: ${{ secrets.VITE_MIXPANEL_TOKEN_PROD }}
          VITE_KURIN_KEY: ${{ secrets.VITE_KURIN_KEY }}
        run: pnpm dist:linux --publish never

      - name: Setup Apple API Key for notarization
        if: matrix.os == 'macos-latest'
        run: |
          set +x
          echo "${{ secrets.APPLE_API_KEY }}" > /tmp/apple-api-key.p8
          chmod 600 /tmp/apple-api-key.p8

      - name: Build dist (macOS)
        if: matrix.os == 'macos-latest'
        timeout-minutes: 35
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STORAGE_IMAGES_URL: ${{ secrets.VITE_STORAGE_IMAGES_URL }}
          VITE_MIXPANEL_TOKEN_PROD: ${{ secrets.VITE_MIXPANEL_TOKEN_PROD }}
          VITE_KURIN_KEY: ${{ secrets.VITE_KURIN_KEY }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: /tmp/apple-api-key.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: pnpm dist:mac --publish never

      - name: Upload artifacts to Supabase Storage (TUS)
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
        run: node scripts/tg-build-upload.mjs

      - name: Notify platform success
        if: success()
        env:
          PLATFORM: ${{ matrix.platform }}
        run: node scripts/tg-notify.mjs platform_success

      - name: Notify platform failure
        if: failure()
        env:
          PLATFORM: ${{ matrix.platform }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/tg-notify.mjs platform_failure

  finalize:
    needs: [prepare, build]
    if: always() && needs.prepare.result == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.20.0'

      - name: Generate signed URLs, notify, cleanup
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: node scripts/tg-build-finalize.mjs
