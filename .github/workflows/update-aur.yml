name: Update AUR Package

on:
  workflow_dispatch:
    inputs:
      app_version:
        description: 'App version tag (e.g. v2.1.0). Leave empty for latest.'
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.app_version }}" ]; then
            TAG="${{ github.event.inputs.app_version }}"
          else
            TAG=$(gh api repos/Vadko/lbk-launcher/releases/latest --jq '.tag_name')
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update PKGBUILD version and checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          VERSION="${{ steps.release.outputs.version }}"
          cd aur
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

          # Download all remote sources and compute sha256sums in source order
          gh release download "$TAG" -p "LBK-Launcher-linux.AppImage" -D /tmp --repo Vadko/lbk-launcher
          HASH_APPIMAGE=$(sha256sum /tmp/LBK-Launcher-linux.AppImage | cut -d' ' -f1)
          HASH_SH=$(sha256sum lbk-launcher.sh | cut -d' ' -f1)
          HASH_DESKTOP=$(sha256sum lbk-launcher.desktop | cut -d' ' -f1)
          HASHES=("$HASH_APPIMAGE" "$HASH_SH" "$HASH_DESKTOP")
          for size in 32 48 64 128 256; do
            curl -sL "https://raw.githubusercontent.com/Vadko/lbk-launcher/main/aur/icons/icon-${size}.png" -o "/tmp/icon-${size}.png"
            HASHES+=("$(sha256sum "/tmp/icon-${size}.png" | cut -d' ' -f1)")
          done

          # Rebuild sha256sums block in PKGBUILD
          {
            echo "sha256sums=('${HASHES[0]}'"
            for h in "${HASHES[@]:1}"; do
              echo "            '${h}'"
            done
            echo ")"
          } > /tmp/newsums.txt
          START=$(grep -n '^sha256sums=(' PKGBUILD | cut -d: -f1)
          END=$(tail -n +"$START" PKGBUILD | grep -n ')$' | head -1 | cut -d: -f1)
          END=$((START + END - 1))
          head -n $((START - 1)) PKGBUILD > PKGBUILD.tmp
          cat /tmp/newsums.txt >> PKGBUILD.tmp
          tail -n +$((END + 1)) PKGBUILD >> PKGBUILD.tmp
          mv PKGBUILD.tmp PKGBUILD

          # Rebuild .SRCINFO
          sed -i "s/pkgver = .*/pkgver = ${VERSION}/" .SRCINFO
          sed -i "s|download/v[^/]*/LBK|download/v${VERSION}/LBK|" .SRCINFO
          sed -i '/^\tsha256sums = /d' .SRCINFO
          INSERT_AFTER=$(grep -n 'source = icon-256' .SRCINFO | cut -d: -f1)
          for i in $(seq $((${#HASHES[@]} - 1)) -1 0); do
            sed -i "${INSERT_AFTER}a\\\\tsha256sums = ${HASHES[$i]}" .SRCINFO
          done

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.1
        with:
          pkgname: lbk-launcher-bin
          pkgbuild: aur/PKGBUILD
          commit_username: LBK Bot
          commit_email: info@lbklauncher.com
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: "Update to v${{ steps.release.outputs.version }}"
          assets: |
            aur/lbk-launcher.sh
            aur/lbk-launcher.desktop
            aur/.SRCINFO

      - name: Create PR with updated PKGBUILD
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          BRANCH="aur/v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add aur/PKGBUILD aur/.SRCINFO
          git commit -m "aur: update to v${VERSION}" || exit 0
          git push -u origin "$BRANCH" --force
          PR_URL=$(gh pr create --title "aur: update to v${VERSION}" --body "Auto-update AUR package to v${VERSION}" --base main)
          gh pr merge "$PR_URL" --auto --squash
